  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fafc;
      --muted: #a9b4c2;
      --paper: #080d14;
      --surface: #101823;
      --line: rgba(226, 232, 240, 0.12);
      --blue: #5b8cff;
      --teal: #29c7b8;
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: var(--font); color: var(--ink);
      background: radial-gradient(circle at 16% 4%, rgba(91, 140, 255, 0.18), transparent 30rem),

      padding: 24px;
    }
    .card {
      text-align: center; max-width: 520px; width: 100%;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 40px 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }
    .code {
      font-size: clamp(48px, 14vw, 96px); font-weight: 900;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    h1 { font-size: 24px; margin: 16px 0 8px; }
    p { color: var(--muted); margin-bottom: 24px; line-height: 1.55; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 46px; border-radius: var(--radius); padding: 12px 24px;
      font-weight: 800; color: #fff; background: var(--blue);
      text-decoration: none; transition: transform 180ms ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .nav-links { margin-top: 16px; }
    .nav-links a { color: var(--blue); font-size: 14px; text-decoration: none; margin: 0 8px; }
    .nav-links a:hover { text-decoration: underline; }
